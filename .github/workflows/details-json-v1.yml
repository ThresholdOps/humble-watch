name: Details JSON V1

on:
  workflow_dispatch:

jobs:
  details:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run details JSON generator
        run: python scripts/details_json_v1.py

      - name: Upload details JSON
        uses: actions/upload-artifact@v4
        with:
          name: details-json-v1
          path: docs/details.json
