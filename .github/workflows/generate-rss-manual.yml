name: Generate RSS Manual

on:
  workflow_dispatch:
  schedule:
    - cron: "10 18 * * *" # 18:10 UTC

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build generator
        run: go build -o gohumble ./cmd/

      - name: Generate RSS and JSON files
        run: cd docs && ../gohumble

      - name: Generate details JSON
        run: python scripts/details_json_v1.py

      - name: Show generated files
        run: |
          ls -la docs
          grep -R "Bundle ends:" -n docs/*.rss || true
          test -f docs/all.json
          test -f docs/urgent.json
          test -f docs/all.rss
          test -f docs/details.json

      - name: Send Discord digest and update seen snapshot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HUMBLE_WATCH_SITE_URL: ${{ vars.HUMBLE_WATCH_SITE_URL }}
        run: python scripts/discord_digest.py

      - name: Commit generated feed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.rss docs/*.json
          if git diff --cached --quiet; then
            echo "No generated feed changes to commit."
          else
            git commit -m "chore: update generated Humble feeds"
            git push
          fi

      - name: Upload generated feed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-feeds
          path: |
            docs/books.rss
            docs/games.rss
            docs/software.rss
            docs/all.rss
            docs/all.json
            docs/urgent.json
            docs/details.json
            docs/seen.json
