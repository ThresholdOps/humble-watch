name: Tier Parser V1

on:
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tier parser v1
        run: python scripts/tier_parser_v1.py

      - name: Upload details diagnostic JSON
        uses: actions/upload-artifact@v4
        with:
          name: tier-parser-v1-details
          path: docs/details.json
