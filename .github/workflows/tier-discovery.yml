name: Tier Discovery

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tier discovery
        run: python scripts/tier_discovery.py

      - name: Upload tier discovery report
        uses: actions/upload-artifact@v4
        with:
          name: tier-discovery-report
          path: docs/tier-discovery-report.txt
